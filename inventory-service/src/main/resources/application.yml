spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
    username: ${INVENTORY_DB_USERNAME:oms}
    password: ${INVENTORY_DB_PASSWORD:oms}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:inventory-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed
    listener:
      ack-mode: record
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8082}

app:
  kafka:
    topics:
      order-placed: ${ORDER_PLACED_TOPIC:order-placed-topic}
      inventory-reserved: ${INVENTORY_RESERVED_TOPIC:inventory-reserved-topic}
      inventory-failed: ${INVENTORY_FAILED_TOPIC:inventory-failed-topic}
      order-failed: ${ORDER_FAILED_TOPIC:order-failed-topic}

logging:
  level:
    root: INFO
    com.paulopacifico.inventoryservice: INFO
