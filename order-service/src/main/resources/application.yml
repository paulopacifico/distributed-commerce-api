spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${ORDER_DB_USERNAME}
    password: ${ORDER_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:order-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed
    listener:
      ack-mode: record
      missing-topics-fatal: false
      observation-enabled: true
    template:
      observation-enabled: true

server:
  port: ${SERVER_PORT:8081}

management:
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

app:
  kafka:
    topics:
      order-placed: ${ORDER_PLACED_TOPIC:order-placed-topic}
      inventory-reserved: ${INVENTORY_RESERVED_TOPIC:inventory-reserved-topic}
      inventory-failed: ${INVENTORY_FAILED_TOPIC:inventory-failed-topic}
      order-failed: ${ORDER_FAILED_TOPIC:order-failed-topic}
      order-confirmed: ${ORDER_CONFIRMED_TOPIC:order-confirmed-topic}
      payment-succeeded: ${PAYMENT_SUCCEEDED_TOPIC:payment-succeeded-topic}
      payment-failed: ${PAYMENT_FAILED_TOPIC:payment-failed-topic}
      order-paid: ${ORDER_PAID_TOPIC:order-paid-topic}
      shipment-shipped: ${SHIPMENT_SHIPPED_TOPIC:shipment-shipped-topic}
      shipment-failed: ${SHIPMENT_FAILED_TOPIC:shipment-failed-topic}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [traceId=%X{traceId:-}, spanId=%X{spanId:-}] %-5level [%t] %logger{50} : %m%n"
  level:
    root: INFO
    com.paulopacifico.orderservice: INFO
