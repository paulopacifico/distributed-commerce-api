apiVersion: v1
kind: Secret
metadata:
  name: {{ include "payment-service.fullname" . }}
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
type: Opaque
data:
  PAYMENT_DB_USERNAME: {{ .Values.secret.dbUsername | b64enc | quote }}
  PAYMENT_DB_PASSWORD: {{ .Values.secret.dbPassword | b64enc | quote }}
