image:
  repository: paulopacifico/gateway-service
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

config:
  serverPort: "8080"
  redisHost: "redis-master"
  redisPort: "6379"
  zipkinEndpoint: "http://zipkin:9411/api/v2/spans"
  tracingSamplingProbability: "1.0"

# JWT_SECRET is read from the Kubernetes secret named `gateway-jwt-secret` (key: secret).
# Supply that secret out-of-band before deploying — do not commit real values here.
jwtSecretRef:
  name: gateway-jwt-secret
  key: secret

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
