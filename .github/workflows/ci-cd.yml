name: Polyglot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test order-service
        working-directory: order-service
        run: mvn -B clean verify

      - name: Build and test inventory-service
        working-directory: inventory-service
        run: mvn -B clean verify

      - name: Build Docker image for order-service
        run: docker build -t order-service:ci ./order-service

      - name: Build Docker image for inventory-service
        run: docker build -t inventory-service:ci ./inventory-service

      - name: Simulate K8s Deployment
        run: |
          # In a real pipeline, this stage would push images to AWS ECR
          # and then trigger a Kubernetes deployment update via Helm/kubectl.
          echo "Deploying to AWS EKS via kubectl..."
          echo "Updating Helm charts..."
