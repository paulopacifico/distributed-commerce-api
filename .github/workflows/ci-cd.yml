name: Polyglot CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest
    env:
      # GitHub-hosted Ubuntu runners already expose a Docker daemon.
      # Testcontainers should use the host socket directly instead of docker:dind.
      TESTCONTAINERS_CHECKS_DISABLE: true
      DOCKER_HOST: unix:///var/run/docker.sock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available
        run: |
          docker info
          docker version
          echo "DOCKER_HOST=${DOCKER_HOST}"

      - name: Pull Testcontainers images
        run: |
          docker pull postgres:16-alpine
          docker pull apache/kafka-native:3.8.0

      - name: Build and test order-service
        working-directory: order-service
        run: mvn -B clean verify -Dspring.profiles.active=test

      - name: Build and test inventory-service
        working-directory: inventory-service
        run: mvn -B clean verify -Dspring.profiles.active=test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            order-service/target/surefire-reports/
            inventory-service/target/surefire-reports/

      - name: Build Docker image for order-service
        run: docker build -t order-service:ci ./order-service

      - name: Build Docker image for inventory-service
        run: docker build -t inventory-service:ci ./inventory-service

      - name: Simulate K8s Deployment
        run: |
          # In a real pipeline, this stage would push images to AWS ECR
          # and then trigger a Kubernetes deployment update via Helm/kubectl.
          echo "Deploying to AWS EKS via kubectl..."
          echo "Updating Helm charts..."
